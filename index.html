<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vipul Kaushal - Escape The Matrix</title>
<!-- answer: rabbit -->
<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#00ff41;font-family:Consolas,monospace;overflow:hidden}
#matrix{position:fixed;inset:0;z-index:-2}
.container{width:min(95vw,800px);margin:auto;padding:20px}
.card{margin-top:20px;background:rgba(0,0,0,.8);border:1px solid #00ff41;padding:20px;border-radius:10px;box-shadow:0 0 20px #00ff41}
#terminal{height:320px;overflow:auto;border:1px solid #00ff41;padding:10px;margin-bottom:10px;text-align:left}
input{width:100%;padding:12px;background:#000;color:#00ff41;border:1px solid #00ff41}
button{margin-top:10px;padding:12px 18px;font-weight:bold}
.hidden{display:none}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<audio id="matrixAudio" loop>
  <source src="matrix.mp3" type="audio/mpeg">
</audio>

<div class="container">
<div class="card" id="intro">
<h1>ENTER THE MATRIX</h1>
<p>Vipul Kaushal has taken the red pill.</p>
<button onclick="startGame()">CONNECT</button>
</div>

<div class="card hidden" id="game">
<h2>MATRIX TERMINAL</h2>
<div id="terminal"></div>
<input id="answer" placeholder="Type answer and press Enter">
<button onclick="submitAnswer()">EXECUTE</button>
</div>

<div class="card hidden" id="win">
<h1>ACCESS GRANTED</h1>
<h2>THE_ONE</h2>
<p>You escaped the Matrix.</p>
</div>
</div>

<script>
const terminal=document.getElementById("terminal");
const input=document.getElementById("answer");

const puzzles=[
{q:"Decode binary: 01110110 01101001 01110000 01110101 01101100",a:"VIPUL"},
{q:"V _ P _ L ; Available letters: I U A E O ; Enter missing letters only.",a:"IU"},
{q:"M=1 A=2 T=3 R=4 I=5. What is MATRIX?",a:"15"},
{q:"The machine hides information where humans rarely look.",a:"RABBIT"},
{q:"Choose BLUE or RED",a:"RED"}
];
let stage=0;

function write(t){terminal.innerHTML += "<p>> "+t+"</p>";terminal.scrollTop=terminal.scrollHeight;}
function loadPuzzle(){write(puzzles[stage].q);}
function startGame(){
document.getElementById("matrixAudio").play().catch(()=>{});
intro.classList.add("hidden");
game.classList.remove("hidden");
write("Connection Established.");
loadPuzzle();
}
function submitAnswer(){
const v=input.value.trim().toUpperCase();
input.value="";
if(v===puzzles[stage].a){
write("ACCESS ACCEPTED");
stage++;
if(stage>=puzzles.length){game.classList.add("hidden");win.classList.remove("hidden");return;}
loadPuzzle();
}else if(stage===4 && v==="BLUE"){
write("Simulation Restarted");
stage=0; terminal.innerHTML=""; loadPuzzle();
}else write("ACCESS DENIED");
}
input.addEventListener("keydown",e=>{if(e.key==="Enter")submitAnswer();});

const canvas=document.getElementById("matrix"),ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize(); addEventListener("resize",resize);
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アイウエオ";
const size=16, cols=Math.floor(innerWidth/size), drops=Array(cols).fill(1);
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,.05)";ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff41";ctx.font=size+"px monospace";
for(let i=0;i<drops.length;i++){
const t=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(t,i*size,drops[i]*size);
if(drops[i]*size>canvas.height&&Math.random()>.975)drops[i]=0;
drops[i]++;
}
},35);
</script>
</body>
</html>
